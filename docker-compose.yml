services:
  postgres:
    image: postgres:17-alpine
    container_name: best-service-postgres
    environment:
      POSTGRES_DB: best_service_decision
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - best-service-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d best_service_decision"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  best-service-postgres-data:
