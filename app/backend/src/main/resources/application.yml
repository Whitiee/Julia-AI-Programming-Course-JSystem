server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: best-service-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/best_service_decision}
    username: ${DATABASE_USERNAME:app}
    password: ${DATABASE_PASSWORD:app}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  servlet:
    multipart:
      max-file-size: ${MAX_IMAGE_SIZE_MB:8}MB
      max-request-size: ${MAX_IMAGE_SIZE_MB:8}MB

best-service:
  upload:
    root: ${UPLOAD_ROOT:./var/uploads}
    max-image-size: ${MAX_IMAGE_SIZE_MB:8}MB
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  openai:
    api-key: ${OPENAI_API_KEY:}
    text-model: ${OPENAI_TEXT_MODEL:gpt-5.2}
    vision-model: ${OPENAI_VISION_MODEL:gpt-5.2}
